<div
    class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center max-w-md mx-auto px-6">
    <!-- Header -->
    <div class="w-full flex items-center justify-between mb-8">
        <a routerLink="/home"
            class="flex size-10 items-center justify-center rounded-full bg-white dark:bg-card-dark shadow-sm text-primary">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h2 class="text-lg font-bold tracking-tight">Join Session</h2>
        <div class="w-10"></div>
    </div>

    <!-- Join by code -->
    <div class="w-full bg-white dark:bg-card-dark rounded-2xl p-6 shadow-lg border border-primary/5">
        <div class="flex flex-col items-center gap-4">
            <div class="w-16 h-16 rounded-2xl bg-primary/15 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-3xl">group_add</span>
            </div>
            <h3 class="text-xl font-bold">Enter Session Code</h3>
            <p class="text-sm text-slate-400 text-center">Ask the host for the 6-character code</p>

            <!-- OTP-style input -->
            <div class="flex gap-2 mt-4">
                @for (i of codeSlots; track i) {
                <input class="otp-input" maxlength="1" [value]="codeChars()[i]" (input)="onCodeInput($event, i)"
                    (keydown)="onCodeKeydown($event, i)" />
                }
            </div>

            @if (error()) {
            <p class="text-red-500 text-sm font-medium mt-2">{{ error() }}</p>
            }

            <button (click)="joinSession()" [disabled]="joining() || codeChars().join('').length < 6"
                class="w-full mt-4 py-3.5 bg-primary hover:bg-primary-dark disabled:opacity-50 text-white font-bold rounded-2xl shadow-lg shadow-primary/25 transition-all duration-200 flex items-center justify-center gap-2">
                @if (joining()) {
                <span class="material-symbols-outlined animate-spin">progress_activity</span>
                Joining...
                } @else {
                <span class="material-symbols-outlined">login</span>
                Join Session
                }
            </button>
        </div>
    </div>

    <!-- Waiting state (after joining) -->
    @if (joined()) {
    <div class="w-full mt-8 bg-white dark:bg-card-dark rounded-2xl p-6 shadow-lg border border-primary/5 text-center">
        <span class="material-symbols-outlined text-primary text-4xl mb-3">hourglass_top</span>
        <h3 class="text-lg font-bold mb-1">You're in!</h3>
        <p class="text-sm text-slate-400">Waiting for the host to start voting...</p>
        <div class="flex gap-1 items-center justify-center mt-4">
            <span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce"></span>
            <span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce [animation-delay:0.15s]"></span>
            <span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce [animation-delay:0.3s]"></span>
        </div>
    </div>
    }
</div>
