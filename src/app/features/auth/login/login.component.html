<div class="login-page">
    <!-- Top Section: White area with sign-in content -->
    <div class="login-top">
        <!-- Logo & Branding -->
        <div class="login-brand">
            <div class="login-logo-icon">
                <span class="material-symbols-outlined">coffee</span>
            </div>
            <h1 class="login-app-name">LepakSpot</h1>
        </div>

        <div class="login-heading">
            <h2 class="login-title">Sign In</h2>
            <p class="login-subtitle">
                Find your next spot to lepak with friends. Discover cafés, vote together, and chill.
            </p>
        </div>
    </div>

    <!-- Bottom Section: Bottom sheet style card -->
    <div class="login-bottom">
        <div class="login-card-content">
            <p class="login-welcome-label">Welcome</p>
            <p class="login-welcome-text">
                Your next great kopi session starts here. Sign in with your Google account to get started.
            </p>

            <!-- Google Sign In Button -->
            <button (click)="authService.signIn()" [disabled]="authService.isSigningIn()" class="login-google-btn">
                @if (authService.isSigningIn()) {
                <div class="login-signing-in">
                    <span class="login-spinner"></span>
                    <span>Signing in...</span>
                </div>
                } @else {
                <div class="login-google-left">
                    <div class="login-google-icon-wrap">
                        <svg class="login-google-icon" viewBox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                    </div>
                    <span class="login-google-text">Continue with Google</span>
                </div>
                <span class="material-symbols-outlined login-google-arrow">arrow_forward</span>
                }
            </button>

            <!-- Developer Bypass Button -->
            <button (click)="authService.bypassLogin()" class="login-bypass-btn">
                <span>Developer Bypass</span>
            </button>

            <!-- Terms -->
            <p class="login-terms">
                By continuing, you agree to LepakSpot's<br />
                <span class="login-terms-link">Terms of Service</span> and
                <span class="login-terms-link">Privacy Policy</span>
            </p>
        </div>
    </div>
</div>
