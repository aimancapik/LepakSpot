<div
    class="relative flex flex-col min-h-[100dvh] bg-latte grain-overlay overflow-x-hidden max-w-md mx-auto border-x-4 border-espresso justify-center px-8 gap-10">

    <!-- App name -->
    <div class="text-center" appFadeUp>
        <h1 class="font-marker text-6xl text-espresso leading-none tracking-tight">LepakSpot</h1>
        <p class="font-zine text-sm uppercase tracking-[0.2em] text-espresso/50 mt-3">Find your next spot in KL</p>
    </div>

    <!-- Actions -->
    <div class="flex flex-col gap-4 w-full" [appFadeUp]="1">
        <!-- Google -->
        <button (click)="authService.signIn()" [disabled]="authService.isSigningIn()"
            class="w-full flex items-center justify-center gap-3 bg-espresso text-off-white font-marker text-base uppercase tracking-wide px-5 py-4 zine-border zine-shadow hover:translate-x-0.5 hover:translate-y-0.5 hover:shadow-none transition-all disabled:opacity-60">
            @if (authService.isSigningIn()) {
            <div class="w-5 h-5 border-2 border-off-white border-t-transparent rounded-full animate-spin"></div>
            Signing in...
            } @else {
            <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
            }
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-3">
            <div class="flex-1 h-px bg-espresso/20"></div>
            <span class="font-marker text-xs text-espresso/30 uppercase">or</span>
            <div class="flex-1 h-px bg-espresso/20"></div>
        </div>

        <!-- Guest -->
        <button (click)="authService.continueAsGuest()"
            class="w-full flex items-center justify-center gap-2 bg-off-white text-espresso font-marker text-base uppercase tracking-wide px-5 py-4 zine-border zine-shadow-sm hover:translate-x-0.5 hover:translate-y-0.5 hover:shadow-none transition-all">
            <span class="material-symbols-outlined text-lg">person_outline</span>
            Browse as Guest
        </button>

        <p class="font-zine text-[9px] uppercase tracking-widest text-espresso/30 text-center">
            Guests can browse spots · Sign in to check-in &amp; earn points
        </p>
    </div>

    <!-- Terms -->
    <p class="font-zine text-[9px] uppercase tracking-wider text-espresso/20 text-center leading-relaxed"
        [appFadeUp]="2">
        By continuing you agree to our
        <span class="text-espresso/40 underline cursor-pointer">Terms</span> &amp;
        <span class="text-espresso/40 underline cursor-pointer">Privacy</span>
    </p>

</div>
