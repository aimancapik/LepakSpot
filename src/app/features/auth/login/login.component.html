<div
    class="relative flex flex-col min-h-screen min-h-[100dvh] bg-latte grain-overlay overflow-x-hidden max-w-md mx-auto border-x-4 border-espresso justify-center px-4 py-10 gap-8">

    <!-- Decorative top-right stamp (kept but simplified) -->
    <div
        class="absolute top-6 right-6 w-12 h-12 border-2 border-espresso rotate-12 z-10 flex items-center justify-center bg-primary">
        <span class="material-symbols-outlined text-espresso text-2xl">coffee</span>
    </div>

    <!-- ─── Hero Section ─────────────────────────────── -->
    <div class="flex flex-col items-center w-full relative z-10">
        <!-- Zine masthead block - Simplified -->
        <div class="relative mb-8 w-full">
            <div class="absolute inset-0 bg-espresso/5 border-2 border-espresso translate-x-1 translate-y-1 z-0"></div>
            <div
                class="relative z-10 bg-off-white border-2 border-espresso px-6 py-6 text-center flex flex-col items-center">
                <img src="logo.svg" alt="LepakSpot Logo" class="w-20 h-20 mb-2 grayscale" />
                <p class="font-zine text-[10px] font-bold uppercase tracking-[0.3em] text-espresso/40 mb-1">Kuala Lumpur
                    · Est. 2025</p>
                <h1 class="font-marker text-5xl font-black text-espresso leading-none tracking-tight">LepakSpot</h1>
                <p class="font-zine text-xs uppercase tracking-widest text-primary mt-2">The Unofficial Cafe Zine</p>
            </div>
        </div>

        <!-- Tagline -->
        <p class="font-marker text-center text-espresso text-lg leading-snug max-w-[280px]">
            Your next great <span class="underline decoration-primary decoration-4">kopi session</span> starts here.
        </p>
    </div>

    <!-- ─── Actions Section ───────────────────────────── -->
    <div class="relative z-20 w-full max-w-[320px] mx-auto space-y-6">
        <!-- Google Button -->
        <button (click)="authService.signIn()" [disabled]="authService.isSigningIn()"
            class="relative w-full group disabled:opacity-60">
            <div
                class="absolute inset-0 bg-espresso translate-x-1 translate-y-1 z-0 group-hover:translate-x-0 group-hover:translate-y-0 transition-transform">
            </div>
            <div
                class="relative z-10 flex items-center justify-between bg-primary border-2 border-espresso px-4 py-3 transition-transform group-hover:translate-x-0.5 group-hover:translate-y-0.5">
                @if (authService.isSigningIn()) {
                <div class="flex items-center justify-center gap-3 w-full">
                    <div class="w-5 h-5 border-2 border-espresso border-t-transparent rounded-full animate-spin">
                    </div>
                </div>
                } @else {
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white border-2 border-espresso flex items-center justify-center shrink-0">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                    </div>
                    <span class="font-marker text-espresso text-base uppercase tracking-wide">Continue with
                        Google</span>
                </div>
                <span class="material-symbols-outlined text-espresso">arrow_forward</span>
                }
            </div>
        </button>

        <div class="flex flex-col items-center gap-4">
            <button (click)="authService.continueAsGuest()"
                class="font-marker text-espresso/60 hover:text-espresso transition-colors text-lg underline decoration-primary decoration-2 underline-offset-4">
                Continue as Guest
            </button>
            <p class="font-zine text-[9px] uppercase tracking-widest text-espresso/30 text-center max-w-[200px]">
                Guests can browse & view spots. Sign in to check-in & earn points.
            </p>
        </div>
    </div>

    <!-- Terms -->
    <div class="mt-auto">
        <p class="font-zine text-[10px] uppercase tracking-wider text-espresso/30 text-center leading-relaxed">
            By continuing you agree to our
            <span class="text-espresso/50 underline cursor-pointer">Terms</span> &amp;
            <span class="text-espresso/50 underline cursor-pointer">Privacy</span>
        </p>
    </div>

</div>
