<!-- Bottom Navigation -->
<div class="fixed bottom-0 left-0 right-0 z-50 max-w-md mx-auto px-3 pb-3 pointer-events-none">
    <nav class="relative flex items-center justify-around bg-off-white border-3 border-espresso pointer-events-auto"
        style="border-width:3px; border-radius:20px; box-shadow:4px 4px 0 #2C1810; padding:10px 8px;">

        <!-- Home -->
        <a routerLink="/home"
            class="nav-item flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl transition-all zine-click-active"
            [class.nav-active]="activeTab() === 'home'">
            <span class="material-symbols-outlined nav-icon" [class.fill-1]="activeTab() === 'home'">home</span>
            <span class="nav-label">Home</span>
        </a>

        <!-- Sessions -->
        <a routerLink="/session"
            class="nav-item flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl transition-all zine-click-active"
            [class.nav-active]="activeTab() === 'sessions'">
            <span class="material-symbols-outlined nav-icon" [class.fill-1]="activeTab() === 'sessions'">groups</span>
            <span class="nav-label">Sessions</span>
        </a>

        <!-- Center FAB -->
        <a routerLink="/session/create"
            class="flex items-center justify-center -mt-8 zine-click-active transition-all"
            style="
                width:56px; height:56px; border-radius:50%;
                background:var(--color-primary);
                border:3px solid #2C1810;
                box-shadow:3px 3px 0 #2C1810;
                flex-shrink:0;
            ">
            <span class="material-symbols-outlined text-espresso" style="font-size:28px;font-weight:700;">add</span>
        </a>

        <!-- Map -->
        <a routerLink="/map"
            class="nav-item flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl transition-all zine-click-active"
            [class.nav-active]="activeTab() === 'map'">
            <span class="material-symbols-outlined nav-icon" [class.fill-1]="activeTab() === 'map'">map</span>
            <span class="nav-label">Map</span>
        </a>

        <!-- Profile -->
        <a routerLink="/profile"
            class="nav-item flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl transition-all zine-click-active"
            [class.nav-active]="activeTab() === 'profile'">
            <span class="material-symbols-outlined nav-icon" [class.fill-1]="activeTab() === 'profile'">person</span>
            <span class="nav-label">Profile</span>
        </a>
    </nav>
</div>
